version: "3.9"
services:
  redis:
    image: redis:7.2-alpine
    container_name: trumpus_redis
    ports:
      - "6379:6379"
    volumes:
      - trumpus_redisdata:/data
  db:
    image: postgres:16
    container_name: trumpus_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trumpus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trumpus}
      POSTGRES_DB: ${POSTGRES_DB:-trumpus}
    ports:
      - "5433:5432"
    volumes:
      - trumpus_pgdata:/var/lib/postgresql/data
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: trumpus_api
    env_file:
      - .env
    extra_hosts:
      - "mail.trumpus.tech:host-gateway"

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-trumpus}:${POSTGRES_PASSWORD:-trumpus}@db:5432/${POSTGRES_DB:-trumpus}?sslmode=disable
      PORT: 8000
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      COOKIE_DOMAIN: ".trumpus.tech"
      COOKIE_SECURE: "true"
      TRUST_PROXY: "true"
      CORS_ORIGINS: "https://trumpus.tech,https://admin.trumpus.tech"
      OAUTH_REDIRECT_ALLOWLIST: "https://trumpus.tech,https://admin.trumpus.tech"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_OAUTH_CALLBACK_URL: ${GOOGLE_OAUTH_CALLBACK_URL:-https://trumpus.tech/api/v1/auth/google/callback}
      LLM_BASE: "http://llm:8010"
      LLM_QUEUE_STREAM: llm_jobs
      LLM_QUEUE_GROUP: llm_workers
      CHAT_EVENT_CHANNEL: chat_events
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TLS: ${SMTP_TLS:-starttls}
      RESET_LINK_BASE: ${RESET_LINK_BASE:-https://trumpus.tech/reset-password}
      MAIL_TEMPLATES_DIR: /app/templates/mail
    volumes:
      - ./templates:/app/templates:ro
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    restart: unless-stopped
  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-trumpus}:${POSTGRES_PASSWORD:-trumpus}@db:5432/${POSTGRES_DB:-trumpus}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      LLM_BASE: "http://llm:8010"
      RUN_MODE: worker
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      LLM_QUEUE_STREAM: llm_jobs
      LLM_QUEUE_GROUP: llm_workers
      CHAT_EVENT_CHANNEL: chat_events
    depends_on:
      - db
      - redis
      - llm
  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api/v1
    container_name: trumpus_admin_web
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"
  client-web:
    build:
      context: ./client-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api/v1
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-G-FVEPRKT0NE}
    container_name: trumpus_client_web
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"
  llm:
    build:
      context: ./llm
      dockerfile: Dockerfile
    container_name: trumpus_llm
    env_file:
      - .env.llm
    environment:
      PORT: 8010
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL_PRIMARY: ${OPENROUTER_MODEL_PRIMARY:-openai/gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "8010:8010"
    depends_on:
      - api
  caddy:
    image: caddy:2
    container_name: trumpus_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - client-web
      - admin-web
volumes:
  trumpus_pgdata:
  trumpus_redisdata:
  caddy_data:
  caddy_config:
