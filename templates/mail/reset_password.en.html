<!doctype html>
<html lang="en">
  <body style="font-family: Arial, sans-serif; line-height: 1.5; color:#111;">
    <h2 style="margin:0 0 12px;">Change Password</h2>

    <p>You requested a password change for your Trumpus account.</p>

    <p style="margin:16px 0;">
      <a href="{{ .Link }}"
         style="display:inline-block;padding:12px 16px;text-decoration:none;border-radius:8px;background:#111;color:#fff;">
        Change password
      </a>
    </p>

    <p style="color:#555;">This link is valid for <b>1 hour</b>.</p>

    <hr style="border:none;border-top:1px solid #eee;margin:24px 0;">
    <p style="color:#777;font-size:12px;">
      If you didn’t request this, you can safely ignore this email.
    </p>
  </body>
</html>
