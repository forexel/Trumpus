services:
  db:
    image: postgres:16
    container_name: trumpus_db
    environment:
      POSTGRES_USER: trumpus
      POSTGRES_PASSWORD: trumpus
      POSTGRES_DB: trumpus
    volumes:
      - trumpus_pgdata:/var/lib/postgresql/data
    networks:
      - apps
    restart: unless-stopped

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: trumpus_api
    environment:
      DATABASE_URL: postgresql://trumpus:trumpus@db:5432/trumpus?sslmode=disable
      PORT: 8000
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0

      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      COOKIE_SECURE: "true"
      TRUST_PROXY: "true"

      # прод:
      CORS_ORIGINS: https://trumpus.tech,https://admin.trumpus.tech
      OAUTH_REDIRECT_ALLOWLIST: https://trumpus.tech

      LLM_BASE: http://llm:8010
    depends_on:
      - db
    networks:
      - apps
      - web
    restart: unless-stopped

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: trumpus_worker
    environment:
      DATABASE_URL: postgresql://trumpus:trumpus@db:5432/trumpus?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      LLM_BASE: http://llm:8010
      RUN_MODE: worker
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - db
      - llm
    networks:
      - apps
    restart: unless-stopped

  llm:
    build:
      context: ./llm
      dockerfile: Dockerfile
    container_name: trumpus_llm
    environment:
      API_BASE: http://api:8000/api/v1
      PORT: 8010
      LLM_PROVIDER: openrouter
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL_PRIMARY: ${OPENROUTER_MODEL_PRIMARY}
      OPENROUTER_MODEL_FALLBACK: ${OPENROUTER_MODEL_FALLBACK}
      OPENROUTER_MODEL_FALLBACK_2: ${OPENROUTER_MODEL_FALLBACK_2}
      OPENROUTER_MODEL_FALLBACK_3: ${OPENROUTER_MODEL_FALLBACK_3}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
    depends_on:
      - api
    networks:
      - apps
    restart: unless-stopped

  client-web:
    build:
      context: ./client-web
      dockerfile: Dockerfile
    container_name: trumpus_client_web
    environment:
      VITE_API_BASE: https://api.trumpus.tech/api/v1
    depends_on:
      - api
    networks:
      - web
    restart: unless-stopped

  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    container_name: trumpus_admin_web
    environment:
      VITE_API_BASE: https://api.trumpus.tech/api/v1
    depends_on:
      - api
    networks:
      - web
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: trumpus_caddy
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - client-web
      - admin-web
      - api

volumes:
  trumpus_pgdata:
  caddy_data:
  caddy_config:

networks:
  web:
    external: true
  apps:
    external: true
